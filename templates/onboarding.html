<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Agent Setup</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.1); max-width: 580px; width: 100%; overflow: hidden; }
    .header { background: #1e40af; padding: 28px; color: white; }
    .header h1 { margin: 0; font-size: 22px; }
    .header p { margin: 6px 0 0; opacity: .8; font-size: 14px; }
    .body { padding: 28px; }
    .section { font-size: 12px; font-weight: bold; text-transform: uppercase; color: #1e40af; margin: 24px 0 10px; letter-spacing: .05em; border-bottom: 2px solid #dbeafe; padding-bottom: 6px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #e5e7eb; border-radius: 7px; font-size: 14px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: #1e40af; }
    .field { display: flex; flex-direction: column; margin-bottom: 14px; }
    button { width: 100%; padding: 13px; background: #1e40af; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🤖 Job Agent Setup</h1>
    <p>Fill this in once. The agent handles everything after that.</p>
  </div>
  <div class="body">
    <form method="POST" enctype="multipart/form-data">
      <div class="section">Personal Information</div>
      <div class="grid">
        <div class="field"><label>Full Name *</label><input name="full_name" required placeholder="Alex Johnson"></div>
        <div class="field"><label>Age *</label><input name="age" type="number" required placeholder="24"></div>
        <div class="field"><label>Email *</label><input name="email" type="email" required placeholder="alex@email.com"></div>
        <div class="field"><label>Phone *</label><input name="phone" required placeholder="+1 555 123 4567"></div>
      </div>
      <div class="field"><label>Location</label><input name="location" value="USA"></div>
      <div class="section">Online Presence</div>
      <div class="grid">
        <div class="field"><label>LinkedIn URL</label><input name="linkedin_url" placeholder="https://linkedin.com/in/you"></div>
        <div class="field"><label>GitHub URL</label><input name="github_url" placeholder="https://github.com/you"></div>
      </div>
      <div class="field"><label>Portfolio / Website</label><input name="portfolio_url" placeholder="https://yoursite.com"></div>
      <div class="section">Job Preferences</div>
      <div class="field"><label>Target Roles (comma separated)</label><input name="target_roles" value="AI/ML Engineer,AI Product Manager,AI Data Analyst,AI Analyst"></div>
      <div class="grid">
        <div class="field"><label>Work Mode</label>
          <select name="preferred_work_mode">
            <option value="Remote" selected>Remote Only</option>
            <option value="Hybrid">Hybrid</option>
            <option value="Any">Any</option>
          </select>
        </div>
        <div class="field"><label>Experience Level</label>
          <select name="experience_level">
            <option value="Entry Level" selected>Entry Level (0-2 yrs)</option>
            <option value="Mid Level">Mid Level (3-5 yrs)</option>
          </select>
        </div>
      </div>
      <div class="section">Notification Email</div>
      <div class="field"><label>Where to send job reports</label><input name="notify_email" placeholder="Same as email above"></div>
      <div class="section">Resume (optional for now)</div>
      <div class="field"><label>Upload your resume (PDF or DOCX)</label><input type="file" name="resume" accept=".pdf,.docx"></div>
      <button type="submit">🚀 Launch My Job Agent</button>
    </form>
  </div>
</div>
</body>
</html>
